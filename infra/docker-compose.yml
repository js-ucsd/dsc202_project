services:
  postgres:
    image: postgres:16
    container_name: dsc202_postgres
    environment:
      POSTGRES_DB: papers
      POSTGRES_USER: papers
      POSTGRES_PASSWORD: papers
    ports:
      - "55432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papers -d papers"]
      interval: 5s
      timeout: 5s
      retries: 20

  neo4j:
    image: neo4j:5
    container_name: dsc202_neo4j
    environment:
      NEO4J_AUTH: "neo4j/password123"
      NEO4JLABS_PLUGINS: '["graph-data-science"]'
      NEO4J_server_memory_pagecache_size: "1G"
      NEO4J_server_memory_heap_initial__size: "1G"
      NEO4J_server_memory_heap_max__size: "1G"
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./neo4j/constraints.cypher:/constraints.cypher:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: dsc202_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  qdrant_data:

